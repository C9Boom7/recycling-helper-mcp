apiVersion: apps/v1
kind: Deployment
metadata:
  name: recycling-helper-mcp
  labels:
    app: recycling-helper-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recycling-helper-mcp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: recycling-helper-mcp
    spec:
      imagePullSecrets:
        - name: kc-cr-secret
      containers:
        - name: mcp-server
          image: REPLACE_WITH_CONTAINER_REGISTRY_IMAGE
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

